<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking App - Login / Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px #aaa;
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 12px; }
        .tab { display: flex; margin-bottom: 20px; }
        .tab button {
            flex: 1;
            background-color: #ddd;
            color: black;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .tab button.active { background-color: #007bff; color: white; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="tab">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
    </div>

    <div id="loginSection" class="form-section active">
        <div id="loginError" class="error"></div>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="registerSection" class="form-section">
        <div id="registerError" class="error"></div>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <input type="tel" id="regPhone" placeholder="Phone" required>
            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script>
    // Переключение табов
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');

    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginSection.classList.add('active');
        registerSection.classList.remove('active');
    });

    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerSection.classList.add('active');
        loginSection.classList.remove('active');
    });

    // LOGIN
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.textContent = '';
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch('/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) {
                const data = await res.json();
                loginError.textContent = data.message || 'Login failed';
                return;
            }
            const user = await res.json();
            alert('Welcome, ' + user.name);
            window.location.href = '/user';
        } catch (err) {
            loginError.textContent = 'Server error';
        }
    });

    // REGISTER
    const registerForm = document.getElementById('registerForm');
    const registerError = document.getElementById('registerError');
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        registerError.textContent = '';
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value;

        try {
            const res = await fetch('/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone })
            });
            if (!res.ok) {
                const data = await res.json();
                registerError.textContent = data.message || 'Registration failed';
                return;
            }
            const user = await res.json();
            alert('Registration successful! Welcome, ' + user.name);
            window.location.href = '/user';
        } catch (err) {
            registerError.textContent = 'Server error';
        }
    });
</script>
</body>
</html>
