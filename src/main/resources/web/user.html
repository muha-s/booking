<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
</head>
<body>
<h1>User Management</h1>

<!-- Форма для создания нового пользователя -->
<h2>Create User</h2>
<form id="createUserForm">
    <label>
        Name:
        <input type="text" id="createName" required>
    </label><br>
    <label>
        Email:
        <input type="email" id="createEmail" required>
    </label><br>
    <label>
        Password:
        <input type="password" id="createPassword" required>
    </label><br>
    <label>
        Phone:
        <input type="text" id="createPhone" required>
    </label><br>
    <button type="submit">Create User</button>
</form>

<hr>

<!-- Форма для обновления существующего пользователя -->
<h2>Update User</h2>
<form id="updateUserForm">
    <label>
        User ID:
        <input type="number" id="updateId" required>
    </label><br>
    <label>
        Name:
        <input type="text" id="updateName" required>
    </label><br>
    <label>
        Email:
        <input type="email" id="updateEmail" required>
    </label><br>
    <label>
        Password:
        <input type="password" id="updatePassword" required>
    </label><br>
    <label>
        Phone:
        <input type="text" id="updatePhone" required>
    </label><br>
    <label>
        Role:
        <select id="updateRole" required>
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>
    </label><br>
    <button type="submit">Update User</button>
</form>

<hr>

<pre id="output"></pre>

<script>
    const output = document.getElementById("output");

    // Создание пользователя
    document.getElementById("createUserForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = [
            document.getElementById("createName").value,
            document.getElementById("createEmail").value,
            document.getElementById("createPassword").value,
            document.getElementById("createPhone").value
        ].join(",");

        try {
            const res = await fetch("/users", {
                method: "POST",
                body: data
            });
            const text = await res.text();
            output.textContent = `Create Response:\n${text}`;
        } catch (err) {
            output.textContent = `Error: ${err}`;
        }
    });

    // Обновление пользователя
    document.getElementById("updateUserForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const userId = document.getElementById("updateId").value;
        const data = [
            document.getElementById("updateName").value,
            document.getElementById("updateEmail").value,
            document.getElementById("updatePassword").value,
            document.getElementById("updatePhone").value,
            document.getElementById("updateRole").value
        ].join(",");

        try {
            const res = await fetch(`/users/${userId}`, {
                method: "PUT",
                body: data
            });
            const text = await res.text();
            output.textContent = `Update Response:\n${text}`;
        } catch (err) {
            output.textContent = `Error: ${err}`;
        }
    });
</script>
</body>
</html>
